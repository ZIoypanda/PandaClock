name: Publish PandaClock Release

on:
  push:
    branches:
      - main
    paths:
      - PandaClock.exe
      - VERSION
      - .github/workflows/publish-release.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release files
        uses: actions/checkout@v4

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(cat VERSION)"
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" PandaClock.exe --clobber
          else
            gh release create "$TAG" PandaClock.exe \
              --title "PandaClock ${VERSION}" \
              --notes "Обновление PandaClock ${VERSION}." \
              --latest
          fi
